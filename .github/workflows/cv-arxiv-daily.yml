# This is a basic workflow to help you get started with Actions

name: Run arXiv Streams Daily

# Controls when the workflow will run
on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
  schedule:
    - cron: "0 0 */5 * *"
  # Triggers the workflow on push or pull request events but only for the main branch
#   push:
#     branches:
#     - main

env:

  GITHUB_USER_NAME: noahfrz
  GITHUB_USER_EMAIL: noah.frontzkowski@tuhh.de
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  
  
# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    name: update
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    
    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        
      - name: Set up Python Env
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
          
      - name: Run daily arxiv 
        run: |
          uv run --with arxiv --with requests --with pyyaml python daily_arxiv.py
          
      - name: Push updated stream artifacts
        run: |
          git config user.name "${GITHUB_USER_NAME}"
          git config user.email "${GITHUB_USER_EMAIL}"
          git add README.md docs/cv-arxiv-daily.json docs/cv-arxiv-daily-web.json docs/index.md docs/cv-arxiv-daily-wechat.json docs/wechat.md
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "GitHub Action Automatic Update arXiv Streams"
          git push
